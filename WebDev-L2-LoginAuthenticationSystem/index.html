<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Vaultline</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-scene">
    <main class="auth-card" role="main">

      <div class="auth-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="4" y="10.5" width="16" height="10" rx="1.5"/>
          <path d="M7.5 10.5V7.2a4.5 4.5 0 0 1 9 0v3.3"/>
        </svg>
      </div>

      <div class="auth-head">
        <h1>Sign in to Vaultline</h1>
        <p>Welcome back. Enter your details to continue.</p>
      </div>

      <div class="banner" id="banner" role="alert" hidden></div>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="field">
          <span class="field-label">Username</span>
          <input type="text" id="loginUsername" name="username" autocomplete="username" placeholder="e.g. j.morgan" required>
          <span class="field-error" data-for="loginUsername"></span>
        </label>

        <label class="field">
          <div class="field-row">
            <span class="field-label">Password</span>
            <button type="button" class="field-link" id="forgotLink">Forgot password?</button>
          </div>
          <div class="password-wrap">
            <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="Enter your password" required>
            <button type="button" class="peek" data-target="loginPassword" aria-label="Show password">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" data-for="loginPassword"></span>
        </label>

        <div class="remember-row">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Keep me signed in on this device</label>
        </div>

        <button type="submit" class="btn-primary" id="loginSubmit">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Sign in</span>
        </button>
      </form>

      <p class="auth-footer" style="margin-top:22px;">Don't have an account? <a href="register.html">Sign up</a></p>
    </main>
  </div>

<script src="storage.js"></script>
<script src="index.js"></script>
</body>
</html>
