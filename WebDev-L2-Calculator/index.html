<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="display-expression" id="expression"></div>
    <div class="display-result" id="result">0</div>
  </div>

  <div class="keys">
    <button class="key clear" data-action="clear">C</button>
    <button class="key util" data-action="backspace">del</button>
    <button class="key operator" data-operator="*">x</button>
    <button class="key operator" data-operator="/">÷</button>

    <button class="key" data-number="7">7</button>
    <button class="key" data-number="8">8</button>
    <button class="key" data-number="9">9</button>
    <button class="key operator" data-operator="-">−</button>

    <button class="key" data-number="4">4</button>
    <button class="key" data-number="5">5</button>
    <button class="key" data-number="6">6</button>
    <button class="key operator" data-operator="+">+</button>

    <button class="key" data-number="1">1</button>
    <button class="key" data-number="2">2</button>
    <button class="key" data-number="3">3</button>
    <button class="key equals" data-action="equals" style="grid-row: span 2;">ENTER</button>

    <button class="key" data-number=".">.</button>
    <button class="key zero" data-number="0">0</button>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
